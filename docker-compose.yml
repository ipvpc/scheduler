services:

  # =============================================================================
  # BACKEND API SERVICE
  # =============================================================================
  scheduler-api:
    image: ${SCHEDULER_API_IMAGE:-scheduler-api:latest}
    environment:
      # Database Configuration (override via .env / docker.env — no secrets in compose)
      - DATABASE_URL=${DATABASE_URL:-postgresql://markets:changeme@db.example.com:5432/markets_prod}
      - POSTGRES_HOST=${POSTGRES_HOST:-db.example.com}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=markets_prod
      - POSTGRES_USER=markets
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST:-redis.example.com}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=2
      
      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - CORS_ORIGINS=http://localhost:3000,http://scheduler-frontend:3000
      
      # Scheduler Configuration
      - SCHEDULER_TIMEZONE=America/New_York
      - MAX_CONCURRENT_TASKS=100
      - TASK_TIMEOUT=300
      
      # Security
      - SECRET_KEY=your-super-secret-key-change-in-production
      - JWT_SECRET_KEY=your-jwt-secret-key-change-in-production
      
      # Logging
      - LOG_LEVEL=INFO
      - TZ=America/New_York
    ports:
      - "8001:8001"
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    networks:
      - scheduler-network
    restart: unless-stopped
  # =============================================================================
  # FRONTEND SERVICE
  # =============================================================================
  scheduler-frontend:
    image: ${SCHEDULER_FRONTEND_IMAGE:-scheduler-frontend:latest}
    environment:
      - REACT_APP_API_URL=http://localhost:8001
      - REACT_APP_WS_URL=ws://localhost:8001/ws
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
    ports:
      - "3000:3000"
    command: ["npm", "start"]
    depends_on:
      - scheduler-api
    networks:
      - scheduler-network
    restart: unless-stopped
networks:
  scheduler-network:
    driver: bridge

 
  